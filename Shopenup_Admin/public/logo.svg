<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  
  <!-- Letter A for Akshar -->
  <path d="M100 50 L130 120 L120 120 L100 80 L80 120 L70 120 Z" fill="url(#textGradient)" stroke="#ffffff" stroke-width="1"/>
  <rect x="95" y="80" width="10" height="25" fill="url(#textGradient)"/>
  
  <!-- Decorative Leaf -->
  <path d="M100 140 Q110 130 120 140 Q110 150 100 140 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Center Dot -->
  <circle cx="100" cy="100" r="8" fill="#ffffff" opacity="0.9"/>
</svg>